<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLPT Master v3 | 日本語能力試験</title>
    <meta name="description" content="JLPT N1-N5 vocabulary flashcard quiz app with spaced repetition and progress tracking.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ ONBOARDING SCREEN ============ -->
<div id="onboarding-screen" class="screen onboarding-screen">
    <div class="onboarding-card">
        <div class="onboarding-logo">🇯🇵</div>
        <h1 class="onboarding-title">JLPT Master</h1>
        <p class="onboarding-sub">日本語能力試験 學習助手</p>
        <div class="onboarding-form">
            <label class="form-label" for="onboard-nickname">暱稱 Nickname</label>
            <input type="text" id="onboard-nickname" class="form-input" placeholder="請輸入你的暱稱" maxlength="20">

            <label class="form-label" for="onboard-level">考試級數 Level</label>
            <select id="onboard-level" class="form-select">
                <option value="N1">N1</option>
                <option value="N2" selected>N2</option>
                <option value="N3">N3</option>
                <option value="N4">N4</option>
                <option value="N5">N5</option>
            </select>

            <label class="form-label" for="onboard-date">考試日期 Exam Date</label>
            <input type="date" id="onboard-date" class="form-input">

            <button id="onboard-submit" class="btn-primary btn-block">開始學習 →</button>
        </div>
    </div>
</div>

<!-- ============ MAIN APP ============ -->
<div id="app-container" class="app-container" style="display:none;">

    <!-- HEADER -->
    <header id="main-header">
        <div class="header-top">
            <div class="logo" id="logo-tap">
                <span class="logo-icon">🇯🇵</span>
                <h1>JLPT Master</h1>
            </div>
            <div class="header-right">
                <div class="countdown-badge" id="countdown-badge" title="距離考試"></div>
                <button class="icon-btn" id="btn-profile" aria-label="User Profile">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
            </div>
        </div>
        <nav class="tab-bar">
            <button class="tab active" data-tab="study">📚 學習</button>
            <button class="tab" data-tab="quiz">📝 測驗</button>
            <button class="tab" data-tab="history">📊 記錄</button>
            <button class="tab" data-tab="starred">⭐ 難字</button>
        </nav>
    </header>

    <!-- ============ STUDY TAB ============ -->
    <section id="tab-study" class="tab-content active">
        <div class="study-controls">
            <select id="deck-selector" class="deck-selector">
                <option value="N1">N1 Deck</option>
                <option value="N2" selected>N2 Deck</option>
                <option value="N3">N3 Deck</option>
                <option value="N4_N5">N4/N5 Deck</option>
            </select>
            <div class="progress-container">
                <span id="progress-text">1 / 100</span>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            </div>
        </div>

        <div class="navigation-controls">
            <div class="slider-container">
                <input type="range" id="card-slider" min="1" max="100" value="1" class="card-slider">
            </div>
            <div class="jump-control">
                <span class="label-text">Go to:</span>
                <input type="number" id="card-number-input" min="1" value="1" class="card-number-input">
                <span id="total-cards-display">/ 100</span>
            </div>
        </div>

        <div class="card-container">
            <div class="card" id="flashcard">
                <div class="card-face card-front">
                    <button class="star-btn" id="star-btn" aria-label="Toggle Star">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </button>
                    <div class="card-content">
                        <h2 id="word-display" class="japanese-text">単語</h2>
                        <p id="reading-front" class="reading-front japanese-text">よみかた</p>
                        <button class="audio-btn main-audio" id="audio-btn" aria-label="Play Audio">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                        </button>
                        <p class="hint-text">Tap to flip</p>
                    </div>
                </div>
                <div class="card-face card-back">
                    <button class="star-btn star-btn-back" id="star-btn-back" aria-label="Toggle Star">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </button>
                    <div class="card-content">
                        <h3 id="meaning-display" class="meaning-text">Meaning</h3>
                        <div class="example-section">
                            <div class="example-header">
                                <span>Example</span>
                                <button class="audio-btn sm" id="example-audio-btn" aria-label="Play Example Audio">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                                </button>
                            </div>
                            <p id="example-display" class="japanese-text example">例文</p>
                            <p id="example-meaning-display" class="meaning-text example-meaning"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn secondary" id="prev-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="control-btn primary" id="know-btn">Next</button>
        </div>

        <div class="settings-bar">
            <label class="toggle-switch">
                <input type="checkbox" id="furigana-toggle" checked>
                <span class="toggle-slider"></span>
                <span class="label-text">Furigana</span>
            </label>
            <label class="toggle-switch">
                <input type="checkbox" id="autoplay-toggle">
                <span class="toggle-slider"></span>
                <span class="label-text">Auto-Audio</span>
            </label>
        </div>
    </section>

    <!-- ============ QUIZ TAB ============ -->
    <section id="tab-quiz" class="tab-content">
        <!-- Quiz Start Screen -->
        <div id="quiz-start" class="quiz-start">
            <div class="quiz-start-card">
                <div class="quiz-start-icon">🎯</div>
                <h2>隨機測驗</h2>
                <p>10 題 ・ 每題 10 分 ・ 滿分 100</p>
                <label class="form-label" for="quiz-deck-select" style="margin-top:1.5rem;">選擇 Deck</label>
                <select id="quiz-deck-select" class="form-select">
                    <option value="N1">N1</option>
                    <option value="N2" selected>N2</option>
                    <option value="N3">N3</option>
                    <option value="N4_N5">N4/N5</option>
                </select>
                <button id="quiz-begin-btn" class="btn-primary btn-block" style="margin-top:1.5rem;">開始測驗 →</button>
            </div>
        </div>

        <!-- Quiz In-Progress -->
        <div id="quiz-active" class="quiz-active" style="display:none;">
            <div class="quiz-progress-bar">
                <div class="quiz-progress-fill" id="quiz-progress-fill"></div>
            </div>
            <div class="quiz-meta">
                <span id="quiz-q-num">1 / 10</span>
                <span class="quiz-score-live">Score: <strong id="quiz-score-live">0</strong></span>
            </div>
            <div class="quiz-question-card">
                <p class="quiz-type-label" id="quiz-type-label">漢字 → 讀音</p>
                <h2 class="quiz-stem" id="quiz-stem">問題</h2>
                <p class="quiz-stem-sub" id="quiz-stem-sub"></p>
            </div>
            <div class="quiz-options" id="quiz-options"></div>
            <button id="quiz-next-btn" class="btn-primary btn-block" disabled style="margin-top:1rem;">下一題 →</button>
        </div>

        <!-- Quiz Result -->
        <div id="quiz-result" class="quiz-result" style="display:none;">
            <div class="result-card">
                <h2>測驗結束！</h2>
                <div class="result-score"><span class="score-big" id="result-score-num">0</span><span class="score-of"> / 100</span></div>
                <p class="result-detail" id="result-detail">答對 0 / 10</p>
                <p class="result-time" id="result-time">用時 0:00</p>
                <div class="result-actions">
                    <button class="btn-secondary" id="result-review-btn">查看錯題</button>
                    <button class="btn-primary" id="result-retry-btn">再測一次</button>
                </div>
            </div>
            <!-- Wrong-answer Review -->
            <div id="quiz-review-list" class="quiz-review-list" style="display:none;"></div>
        </div>
    </section>

    <!-- ============ HISTORY TAB ============ -->
    <section id="tab-history" class="tab-content">
        <h2 class="section-title">測驗記錄</h2>
        <div id="history-list" class="history-list"></div>
    </section>

    <!-- ============ STARRED TAB ============ -->
    <section id="tab-starred" class="tab-content">
        <div class="starred-header">
            <h2 class="section-title">⭐ 難字清單</h2>
            <select id="starred-deck-filter" class="deck-selector small-select">
                <option value="ALL">全部</option>
                <option value="N1">N1</option>
                <option value="N2">N2</option>
                <option value="N3">N3</option>
                <option value="N4_N5">N4/N5</option>
            </select>
        </div>
        <div id="starred-list" class="starred-list"></div>
    </section>

    <!-- ============ PROFILE MODAL ============ -->
    <div id="profile-modal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h2>👤 個人資料</h2>
            <label class="form-label" for="profile-nickname">暱稱</label>
            <input type="text" id="profile-nickname" class="form-input" maxlength="20">
            <label class="form-label" for="profile-level">考試級數</label>
            <select id="profile-level" class="form-select">
                <option value="N1">N1</option>
                <option value="N2">N2</option>
                <option value="N3">N3</option>
                <option value="N4">N4</option>
                <option value="N5">N5</option>
            </select>
            <label class="form-label" for="profile-date">考試日期</label>
            <input type="date" id="profile-date" class="form-input">
            <div class="modal-actions">
                <button class="btn-secondary" id="profile-cancel">取消</button>
                <button class="btn-primary" id="profile-save">儲存</button>
            </div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
